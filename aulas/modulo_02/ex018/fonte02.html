<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas</title>
    <style>
        @font-face {
            font-family: 'old';
            src: url('fontes/Olondon_.otf') format('opentype'), url('fontes/Olondona.otf') format('opentype'), url('fontes/OldLondon.ttf') format('truetype'), url('fontes/OldLondonAlternate.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            /*
            tipos de fomrat()
            - opentype (otf)
            - trutype (ttf)
            - embedded-oppentype
            - truetype-aat (Apply Advanced Typography)
            - svg 
            */
        }
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        h1{
            font-family: 'old', times, serif;
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Título</h1> 
    <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Sit ex porro ullam nam minus molestiae consectetur debitis expedita sint sunt reprehenderit, iusto, aliquid sequi alias culpa commodi voluptates laborum veritatis!</p>   
</body>
</html>
