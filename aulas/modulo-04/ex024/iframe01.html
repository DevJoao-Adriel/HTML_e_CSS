    <title>Estudos de Iframe</title>
    <style>
        iframe{
            width: 400px;
            height: 400px;
        }

</head>
<body>
    <h1>Testando o uso de Iframe</h1>
    <p>Acessando o site do 

        <!-- Tamanho padrão do iframe 300x150px -->

       </iframe>

        para aprender a programar
    </p>
    <p>
        O site do 
        
        <iframe src="https://www.google.com.br" frameborder="0">

        </iframe>

    </p>
    <p>
        O repositório do Guanabara

        <iframe src="https://gustavoguanabara.github.io" frameborder="0" height="500" width="500">
