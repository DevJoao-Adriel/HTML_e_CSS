<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vides com HTML5</title>
</head>
<body>
    <h1>Inserindo vídeos hospedados localmente</h1>
    <p>Este vídeo está hospedado no meu próprio servidor.</p>

    <!-- <video src="midia/meu_video.mp4" width="500" controls></video>
    <video src="midia/meu_video.m4v.mp4" width="500" controls></video>
    <video src="midia/meu_video.webm.webm" width="500" controls></video> -->

    <video width="560"  poster="imagens/foto.jpg" controls loop>
        <source src="midia/meu_video.m4v.mp4" type="video/mp4">
        <source src="midia/meu_video.webm.webm" type="video/webm">
        <p>Seu navegador não tem compartibilhidade com reprodução de video</p>
    </video>

    <h1>Inserindo videos do YouTube</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/OzUnqQk4eOg?si=9SzqcURhA9Rj4POl" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    <h1>Inserindo videos do Vimeo</h1>
    <iframe title="vimeo-player" src="https://player.vimeo.com/video/1180762644?h=43f64e90d1" width="560" height="315" frameborder="0" referrerpolicy="strict-origin-when-cross-origin" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"   allowfullscreen></iframe>
</body>
</html>
