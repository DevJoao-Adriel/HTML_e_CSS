<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagens dinâmicas</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador.</p>

    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p-png.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m-png.png" type="image/png">
        <img src="imagens/foto-g-png.png" alt="Foto flexível">
    </picture>

    <h1>Reproduzindo áudios em HTML5</h1>
    <p>Vamos reproduzir áudios em HTML5.</p>
    <audio src="midia/falasódeamor.mp3.mpeg" controls></audio>
    <audio preload="metadata" controls loop>
        <source src="midia/falasódeamor.mp3.mpeg" type="audio/mpeg">
        <source src="midia/falasódeamor.ogg" type="audio/ogg">
        <source src="midia/falasódeamor.wav" type="audio/wav"> <!--muito pesado, não recomendado-->
        <p>Infelizmente seu navegador não consegue reproduzir áudio. <a href="midia/falasódeamor.mp3.mpeg">clique aqui para baixar o arquivo MP3</a></p>
    </audio>
    <!-- MP3 WAV OGG -->
</body>
</html>
